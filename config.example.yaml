  # - name: minimax-m2.7-highspeed
  #   display_name: MiniMax M2.7 Highspeed
  #   use: langchain_openai:ChatOpenAI
  #   model: MiniMax-M2.7-highspeed
  #   api_key: $MINIMAX_API_KEY
