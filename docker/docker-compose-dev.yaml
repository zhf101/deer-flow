# DeerFlow Development Environment (Normal Mode)
# Usage: docker-compose -f docker/docker-compose-dev.yaml up -d
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Frontend Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - langgraph: LangGraph server (port 2024)
#
# For debugging mode with VS Code Server, use:
#   docker-compose -f docker/docker-compose-build.yaml build
#   docker-compose -f docker/docker-compose-debug.yaml up -d
#
# Access: http://localhost:2026

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "2026:2026"
    volumes:
      # nginx.docker.conf: uses Docker service names, no provisioner route
      - ./nginx/nginx.docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - deer-flow-dev
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    image: deer-flow-frontend:dev
    container_name: deer-flow-frontend
    ports:
      - "3000:3000"  # Direct access for debugging
    command: sh -c "cd frontend && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
      - ../frontend/next.config.js:/app/frontend/next.config.js:ro
      - ../logs:/app/logs
      # Use named volume for pnpm cache (Windows compatible)
      - pnpm-store:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
    env_file:
      - ../frontend/.env
    networks:
      - deer-flow-dev
    restart: unless-stopped

  # ── Gateway API ────────────────────────────────────────────────────────
  gateway:
    image: deer-flow-backend:dev
    container_name: deer-flow-gateway
    ports:
      - "8001:8001"
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-include='*.yaml .env' > /app/logs/gateway.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      - gateway-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      # Use named volume for uv cache (Windows compatible)
      - uv-cache:/root/.cache/uv
      # DooD: Docker outside of Docker for sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      # Use container-relative paths; host paths only needed for DooD sandbox mode
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_ROOT:-}/backend/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_ROOT:-}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: unless-stopped

  # ── LangGraph Server ───────────────────────────────────────────────────
  langgraph:
    image: deer-flow-backend:dev
    container_name: deer-flow-langgraph
    ports:
      - "2024:2024"
    command: sh -c "cd backend && uv run langgraph dev --no-browser --allow-blocking --host 0.0.0.0 --port 2024 > /app/logs/langgraph.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      - langgraph-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      # Use named volume for uv cache (Windows compatible)
      - uv-cache:/root/.cache/uv
      # DooD: Docker outside of Docker for sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      # Use container-relative paths; host paths only needed for DooD sandbox mode
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_ROOT:-}/backend/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_ROOT:-}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: unless-stopped

volumes:
  gateway-venv:
  langgraph-venv:
  # Named volumes for caches (cross-platform compatible)
  pnpm-store:
  uv-cache:

networks:
  deer-flow-dev:
    driver: bridge
    # Let Docker auto-assign subnet to avoid conflicts
