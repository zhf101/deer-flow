# Nginx configuration for Docker development environment
# - Uses Docker service names (gateway, langgraph, frontend)
# - No provisioner route (for local/aio sandbox modes)

events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Docker internal DNS
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Upstream servers (using Docker service names)
    upstream gateway {
        server gateway:8001;
    }

    upstream langgraph {
        server langgraph:2024;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 2026 default_server;
        listen [::]:2026 default_server;
        server_name _;

        # CORS headers
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # LangGraph API routes
        location /api/langgraph/ {
            rewrite ^/api/langgraph/(.*) /$1 break;
            proxy_pass http://langgraph;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        # Gateway API routes
        location /api/models { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /api/memory { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /api/mcp { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /api/skills { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /api/agents { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /api/nlp2sql { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }

        location ~ ^/api/threads/[^/]+/uploads {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            client_max_body_size 100M;
            proxy_request_buffering off;
        }

        location ~ ^/api/threads {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # API Documentation
        location /docs { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /redoc { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }
        location /health { proxy_pass http://gateway; proxy_http_version 1.1; proxy_set_header Host $host; }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}
